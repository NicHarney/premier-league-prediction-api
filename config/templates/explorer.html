{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Premier League Data Explorer</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="{% static 'styles.css' %}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">PL Prediction Engine</a>

<div class="navbar-nav">

<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/predict/">Predict</a>
<a class="nav-link" href="/value/">Value Betting</a>
<a class="nav-link" href="/backtest/">Backtest</a>
<a class="nav-link active" href="/explorer/">Data Explorer</a>
<a class="nav-link" href="/api/docs/">API Docs</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2 class="text-center mb-4">
Premier League Data Explorer
</h2>


<!-- TEAM SEARCH -->

<div class="card p-4 mb-4 shadow">

<h4>Team Explorer</h4>

<div class="row">

<div class="col-md-9">

<input id="teamSearch"
class="form-control"
placeholder="Search team by name (e.g. Arsenal)">

</div>

<div class="col-md-3">

<button class="btn btn-primary w-100"
onclick="searchTeams()">
Search
</button>

</div>

</div>

</div>


<!-- MATCH SEARCH -->

<div class="card p-4 mb-4 shadow">

<h4>Match Explorer</h4>

<div class="row mb-3">

<div class="col-md-4">

<label>Home Team</label>

<select id="homeTeam"
class="form-control">
<option value="">Any</option>
</select>

</div>

<div class="col-md-4">

<label>Away Team</label>

<select id="awayTeam"
class="form-control">
<option value="">Any</option>
</select>

</div>

<div class="col-md-4">

<label>Season</label>

<input id="season"
class="form-control"
placeholder="Example: 2023">

</div>

</div>

<button class="btn btn-success w-100"
onclick="searchMatches()">
Search Matches
</button>

</div>


<!-- RESULTS -->

<div id="results"></div>

</div>


<script src="{% static 'explorer.js' %}"></script>

</body>

</html>
