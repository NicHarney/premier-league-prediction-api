{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Value Betting Tool</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="{% static 'styles.css' %}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">PL Prediction Engine</a>

<div class="navbar-nav">

<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/predict/">Predict</a>
<a class="nav-link" href="/value/">Value Betting</a>
<a class="nav-link" href="/backtest/">Backtest</a>
<a class="nav-link" href="/explorer/">Data Explorer</a>
<a class="nav-link" href="/api/docs/">API Docs</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">
Value Betting Calculator
</h2>

<div class="card p-4">

<div class="row mb-3">

<div class="col">
<label>Home Team</label>
<select id="homeTeam" class="form-control"></select>
</div>

<div class="col">
<label>Away Team</label>
<select id="awayTeam" class="form-control"></select>
</div>

</div>

<div class="row mb-3">

<div class="col">
<label>Home Odds</label>
<input id="homeOdds" class="form-control">
</div>

<div class="col">
<label>Draw Odds</label>
<input id="drawOdds" class="form-control">
</div>

<div class="col">
<label>Away Odds</label>
<input id="awayOdds" class="form-control">
</div>

</div>

<button class="btn btn-success w-100" onclick="calculateValue()">
Calculate Value
</button>

</div>

<div id="results" class="mt-4"></div>

</div>

<script src="{% static 'value.js' %}"></script>

</body>

</html>
