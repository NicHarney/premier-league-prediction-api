components:
  schemas:
    BettingOdds:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        match:
          type: integer
        home_team:
          type: string
          readOnly: true
        away_team:
          type: string
          readOnly: true
        match_date:
          type: string
          format: date-time
          readOnly: true
        home_win_odds:
          type: number
          format: double
        draw_odds:
          type: number
          format: double
        away_win_odds:
          type: number
          format: double
        bookmaker:
          type: string
          maxLength: 100
      required:
      - away_team
      - away_win_odds
      - bookmaker
      - draw_odds
      - home_team
      - home_win_odds
      - id
      - match
      - match_date
    Match:
      type: object
      properties:
        id:
